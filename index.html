<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controllo Totale - Scroll Animation</title>
    <style>
        body {
            margin: 0;
            background-color: #000;
            height: 800vh; /* Più è alto, più è lento e controllato */
        }

        .sticky-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            max-width: 100vw;
            max-height: 100vh;
            object-fit: contain;
        }

        .info {
            position: fixed;
            bottom: 20px;
            width: 100%;
            text-align: center;
            color: rgba(255,255,255,0.5);
            font-size: 0.8rem;
            text-transform: uppercase;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="info">Controllo manuale attivo</div>

    <div class="sticky-container">
        <canvas id="animation-canvas"></canvas>
    </div>

    <script>
        const canvas = document.getElementById("animation-canvas");
        const context = canvas.getContext("2d");

        // --- CONFIGURAZIONE ---
        const totalCartella1 = 63; 
        const totalCartella2 = 63; 
        const loopSpeed = 80;      
        
        let currentFrame = 0;       
        let targetFrame = 0;
        const smoothness = 0.25; 

        const formatNumber = (num) => String(num).padStart(4, '0');

        const immaginiLoop = [];
        const immaginiScroll = [];

        // Caricamento immagini
        for (let i = 1; i <= totalCartella1; i++) {
            const img = new Image();
            img.src = `1/${formatNumber(i)}.png`;
            immaginiLoop.push(img);
        }
        for (let i = 1; i <= totalCartella2; i++) {
            const img = new Image();
            img.src = `2/${formatNumber(i)}.png`;
            immaginiScroll.push(img);
        }

        // FUNZIONE DI SICUREZZA: Disegna subito la primissima foto appena carica
        immaginiLoop[0].onload = () => {
            canvas.width = immaginiLoop[0].width;
            canvas.height = immaginiLoop[0].height;
            context.drawImage(immaginiLoop[0], 0, 0); // Forziamo il primo disegno qui
        };

        // --- LOOP AUTOMATICO ---
        let loopIndex = 0;
        let isScrolling = false;

        setInterval(() => {
            if (!isScrolling) {
                context.clearRect(0, 0, canvas.width, canvas.height);
                if (immaginiLoop[loopIndex]) {
                    context.drawImage(immaginiLoop[loopIndex], 0, 0);
                }
                loopIndex = (loopIndex + 1) % totalCartella1;
            }
        }, loopSpeed);

        // --- LOGICA DI POSIZIONAMENTO ---
        window.addEventListener("scroll", () => {
            const scrollTop = window.scrollY;
            const maxScroll = document.documentElement.scrollHeight - window.innerHeight;
            const scrollFraction = scrollTop / maxScroll;

            if (scrollTop > 20) {
                isScrolling = true;
                targetFrame = scrollFraction * (totalCartella2 - 1);
            } else {
                isScrolling = false;
            }
        });

        // --- RENDERING CONTINUO ---
        function animate() {
            if (isScrolling) {
                const diff = targetFrame - currentFrame;
                currentFrame += diff * smoothness;

                const frameToDraw = Math.round(currentFrame);

                context.clearRect(0, 0, canvas.width, canvas.height);
                if (immaginiScroll[frameToDraw]) {
                    context.drawImage(immaginiScroll[frameToDraw], 0, 0);
                }
            }
            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
