<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loop Video Switcher</title>
    <style>
        /* Stile base per centrare il tutto e sfondo scuro */
        body {
            margin: 0;
            padding: 0;
            background-color: #121212;
            color: #ffffff;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .video-container {
            position: relative;
            width: 80%;
            max-width: 800px;
            aspect-ratio: 16/9; /* Adatta questa proporzione ai tuoi video se necessario */
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }

        video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Classe per nascondere il video che non deve vedersi */
        .hidden {
            display: none;
            opacity: 0;
        }

        /* Stile temporaneo del bottone (puoi modificarlo come vuoi) */
        #actionBtn {
            margin-top: 20px;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            color: #fff;
            background-color: #007bff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.2s;
        }

        #actionBtn:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

    <div class="video-container">
        <video id="video1" autoplay loop muted playsinline>
            <source src="1.mkv" type="video/mp4">
            Il tuo browser non supporta i video HTML5.
        </video>

        <video id="video2" class="hidden" muted playsinline>
            <source src="2.mkv" type="video/mp4">
            Il tuo browser non supporta i video HTML5.
        </video>
    </div>

    <button id="actionBtn">Attiva Seconda Animazione</button>

    <script>
        const v1 = document.getElementById('video1');
        const v2 = document.getElementById('video2');
        const btn = document.getElementById('actionBtn');

        btn.addEventListener('click', () => {
            // 1. Ferma e nascondi il primo video
            v1.pause();
            v1.classList.add('hidden');

            // 2. Mostra e avvia il secondo video
            v2.classList.remove('hidden');
            v2.play();

            // Opzionale: nasconde il bottone dopo il click se non serve più
            btn.style.display = 'none'; 
        });
    </script>
</body>
</html>
