<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animazione 1920x1080 - PNG</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            background-color: #000;
            overflow-x: hidden;
        }

        /* Contenitore per il loop in alto */
        #hero-loop {
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
        }

        /* Sezione per lo scroll */
        #scroll-section {
            height: 400vh; /* Più è alta, più lo scroll è lento e fluido */
            position: relative;
        }

        .sticky-wrapper {
            position: sticky;
            top: 0;
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            display: block;
            max-width: 100vw;
            max-height: 100vh;
            /* Mantiene le proporzioni 16:9 */
            aspect-ratio: 1920 / 1080;
            object-fit: contain;
        }
    </style>
</head>
<body>

    <div id="hero-loop">
        <canvas id="loopCanvas"></canvas>
    </div>

    <div id="scroll-section">
        <div class="sticky-wrapper">
            <canvas id="scrollCanvas"></canvas>
        </div>
    </div>

    <script>
        const config = {
            frames: 63,
            width: 1920,
            height: 1080,
            ext: 'png' // <-- Impostato su .png
        };

        // --- Utility per caricare immagini ---
        function loadSequence(folder, count) {
            const images = [];
            for (let i = 1; i <= count; i++) {
                const img = new Image();
                // Formatta il numero con zeri iniziali (es. 1 diventa "0001", 63 diventa "0063")
                const fileName = i.toString().padStart(4, '0');
                img.src = `./${folder}/${fileName}.${config.ext}`;
                images.push(img);
            }
            return images;
        }

        const images1 = loadSequence('1', config.frames);
        const images2 = loadSequence('2', config.frames);

        // --- Setup Canvas ---
        const setupCanvas = (id) => {
            const canvas = document.getElementById(id);
            canvas.width = config.width;
            canvas.height = config.height;
            return { el: canvas, ctx: canvas.getContext('2d') };
        };

        const loop = setupCanvas('loopCanvas');
        const scroll = setupCanvas('scrollCanvas');

        // --- Animazione LOOP (Cartella 1) ---
        let currentLoopFrame = 0;
        function animateLoop() {
            loop.ctx.clearRect(0, 0, config.width, config.height);
            const img = images1[currentLoopFrame];
            if (img && img.complete) {
                loop.ctx.drawImage(img, 0, 0);
            }
            currentLoopFrame = (currentLoopFrame + 1) % config.frames;
            requestAnimationFrame(() => setTimeout(animateLoop, 33)); // ~30fps
        }

        // --- Animazione SCROLL (Cartella 2) ---
        function updateScrollFrame() {
            const section = document.getElementById('scroll-section');
            const rect = section.getBoundingClientRect();
            
            // Calcola quanto della sezione è stata scrollata (da 0 a 1)
            const scrollFraction = Math.max(0, Math.min(1, -rect.top / (rect.height - window.innerHeight)));
            
            // Trova il frame corrispondente
            const frameIndex = Math.min(config.frames - 1, Math.floor(scrollFraction * config.frames));
            
            scroll.ctx.clearRect(0, 0, config.width, config.height);
            const img = images2[frameIndex];
            if (img && img.complete) {
                scroll.ctx.drawImage(img, 0, 0);
            }
        }

        // Inizializzazione
        window.onload = () => {
            animateLoop();
            updateScrollFrame();
        };

        window.addEventListener('scroll', updateScrollFrame);
    </script>
</body>
</html>
