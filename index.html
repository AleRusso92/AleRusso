<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scroll Animation - Apple Style</title>
    <style>
        body {
            margin: 0;
            background-color: #000;
            font-family: sans-serif;
            /* FONDAMENTALE: Questo crea lo spazio fisico per poter scorrere la pagina */
            height: 500vh; 
        }

        .sticky-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            max-width: 100vw;
            max-height: 100vh;
            object-fit: contain;
        }

        .info {
            position: fixed;
            bottom: 20px;
            width: 100%;
            text-align: center;
            color: rgba(255,255,255,0.7);
            font-size: 0.9rem;
            text-transform: uppercase;
            pointer-events: none;
            z-index: 10;
        }
    </style>
</head>
<body>

    <div class="info">Scorri per esplorare / Resta fermo per il loop</div>

    <div class="sticky-container">
        <canvas id="animation-canvas"></canvas>
    </div>

    <script>
        const canvas = document.getElementById("animation-canvas");
        const context = canvas.getContext("2d");

        // --- 1. CONFIGURAZIONE ---
        const totalCartella1 = 63; 
        const totalCartella2 = 63; 
        const loopSpeed = 80;      
        
        let currentFrame = 0;       
        let targetFrame = 0;
        
        // Questo è l'ammortizzatore (Lerp). 
        // 0.08 è il valore perfetto per unire reattività e morbidezza.
        const ease = 0.08; 

        const formatNumber = (num) => String(num).padStart(4, '0');

        const immaginiLoop = [];
        const immaginiScroll = [];

        // Caricamento immagini
        for (let i = 1; i <= totalCartella1; i++) {
            const img = new Image();
            img.src = `1/${formatNumber(i)}.png`;
            immaginiLoop.push(img);
        }
        for (let i = 1; i <= totalCartella2; i++) {
            const img = new Image();
            img.src = `2/${formatNumber(i)}.png`;
            immaginiScroll.push(img);
        }

        immaginiLoop[0].onload = () => {
            canvas.width = immaginiLoop[0].width;
            canvas.height = immaginiLoop[0].height;
            context.drawImage(immaginiLoop[0], 0, 0);
        };

        // --- 2. LOOP INIZIALE ---
        let loopIndex = 0;
        let isScrolling = false;

        setInterval(() => {
            if (!isScrolling) {
                context.clearRect(0, 0, canvas.width, canvas.height);
                if (immaginiLoop[loopIndex]) {
                    context.drawImage(immaginiLoop[loopIndex], 0, 0);
                }
                loopIndex = (loopIndex + 1) % totalCartella1;
            }
        }, loopSpeed);

        // --- 3. LETTURA DELLO SCROLL NATIVO ---
        window.addEventListener("scroll", () => {
            // Compatibilità migliorata per calcolare lo scroll esatto
            const scrollTop = window.scrollY || document.documentElement.scrollTop;
            const maxScroll = document.documentElement.scrollHeight - window.innerHeight;
            
            if (maxScroll > 0) {
                const scrollFraction = scrollTop / maxScroll;

                if (scrollTop > 10) {
                    isScrolling = true;
                    // Calcoliamo dove "dovrebbe" essere il frame in base allo scroll
                    targetFrame = scrollFraction * (totalCartella2 - 1);
                } else {
                    isScrolling = false;
                    targetFrame = 0;
                    currentFrame = 0;
                }
            }
        });

        // --- 4. MOTORE DI RENDERING FLUIDO ---
        function animate() {
            if (isScrolling) {
                // L'ammortizzatore che fa scivolare dolcemente currentFrame verso targetFrame
                currentFrame += (targetFrame - currentFrame) * ease;
                
                // Arrotondiamo per scegliere l'immagine da disegnare
                const frameToDraw = Math.round(currentFrame);
                const safeFrame = Math.max(0, Math.min(totalCartella2 - 1, frameToDraw));

                context.clearRect(0, 0, canvas.width, canvas.height);
                if (immaginiScroll[safeFrame]) {
                    context.drawImage(immaginiScroll[safeFrame], 0, 0);
                }
            }
            
            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
