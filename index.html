<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scroll Inertia - Balanced Mix</title>
    <style>
        body {
            margin: 0;
            background-color: #000;
            font-family: sans-serif;
            /* Teniamo l'altezza generosa così hai spazio per fare più scrollate di seguito */
            height: 400vh; 
        }

        .sticky-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            max-width: 100vw;
            max-height: 100vh;
            object-fit: contain;
        }

        .info {
            position: fixed;
            bottom: 20px;
            width: 100%;
            text-align: center;
            color: rgba(255,255,255,0.7);
            font-size: 0.9rem;
            text-transform: uppercase;
            pointer-events: none;
        }
    </style>
</head>
