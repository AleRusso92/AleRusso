<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animazione Video Smooth</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            margin: 0;
            padding: 0;
            background-color: #000000;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            overflow: hidden; /* Blocca lo scroll */
        }

        .animation-viewport {
            position: relative;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }

        /* I video riempiono lo schermo e si sovrappongono perfettamente */
        .video-container video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover; /* Mantiene il full screen 1920x1080. Cambia in 'contain' se non vuoi tagli */
            transition: opacity 0.2s ease; /* Sfocatura leggerissima opzionale per il cambio */
        }

        /* Video 2 parte nascosto */
        #video-2 {
            opacity: 0;
            pointer-events: none;
        }

        /* Interfaccia utente */
        .ui-overlay {
            position: absolute;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
        }

        .trigger-btn {
            background-color: #ffffff;
            color: #000000;
            border: none;
            padding: 15px 30px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 255, 255, 0.3);
            transition: all 0.2s ease;
        }

        .trigger-btn:hover {
            background-color: #00ffcc;
            transform: scale(1.05);
        }

        .trigger-btn:disabled {
            background-color: #333333;
            color: #666666;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
    </style>
</head>
<body>

    <div class="animation-viewport">
        <div class="ui-overlay">
            <button id="start-video-2" class="trigger-btn">Avvia Video 2</button>
        </div>
        
        <div class="video-container">
            <video id="video-1" src="1.mp4" autoplay loop muted playsinline></video>
            
            <video id="video-2" src="2.mp4" muted playsinline></video>
        </div>
    </div>

    <script>
        const video1 = document.getElementById('video-1');
        const video2 = document.getElementById('video-2');
        const btnTrigger = document.getElementById('start-video-2');

        btnTrigger.addEventListener('click', () => {
            // 1. Avvia il secondo video in background per farlo trovare pronto
            video2.play();
            
            // 2. Nascondi il primo video e mostra il secondo
            video1.style.opacity = '0';
            video2.style.opacity = '1';
            
            // 3. Ferma il primo video per risparmiare risorse CPU
            video1.pause();

            // Modifica il pulsante per mostrare lo stato di riproduzione
            btnTrigger.innerText = "Riproduzione...";
            btnTrigger.style.pointerEvents = "none";
        });

        // Ascolta quando il Video 2 arriva alla fine del suo unico filmato
        video2.addEventListener('ended', () => {
            btnTrigger.innerText = "Video Concluso";
            btnTrigger.disabled = true;
        });
    </script>

</body>
</html>
