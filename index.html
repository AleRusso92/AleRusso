<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Ale</title>
    <style>
        
        * {
            box-sizing: border-box;
        }
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: sans-serif;
        }

        video {
            position: fixed;
            top: 50%;
            left: 50%;
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            z-index: 1;
            transform: translate(-50%, -50%);
            object-fit: cover; 
            transition: opacity 0.3s ease;
            opacity: 1;
        }

        .hidden {
            opacity: 0;
            pointer-events: none;
        }

        #actionBtn {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            padding: 16px 32px;
            font-size: 18px;
            font-weight: bold;
            color: #fff;
            background-color: #007bff;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            transition: all 0.2s ease;
        }

        #actionBtn:hover {
            background-color: #0056b3;
            transform: translateX(-50%) scale(1.05);
        }

        #actionBtn.waiting {
            background-color: #6c757d;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <video id="video1" autoplay loop muted playsinline>
        <source src="1.mp4" type="video/mp4">
    </video>

    <video id="video2" class="hidden" muted playsinline>
        <source src="2.mp4" type="video/mp4">
    </video>

    <button id="actionBtn">dio can</button>

    <script>
        const v1 = document.getElementById('video1');
        const v2 = document.getElementById('video2');
        const btn = document.getElementById('actionBtn');
        
        let cambioPrenotato = false;
        let lastTime = 0;

        btn.addEventListener('click', () => {
            if (cambioPrenotato) return;
  
            cambioPrenotato = true;
            v1.loop = false;
            
            btn.classList.add('waiting');
            btn.innerText = "Cambio al termine dell'animazione...";
        });

        v1.addEventListener('timeupdate', () => {
            if (cambioPrenotato) {
                if (v1.duration && v1.currentTime >= v1.duration - 0.2) {
                    avviaSecondoVideo();
                    return;
                }
                
                if (v1.currentTime < lastTime) {
                    avviaSecondoVideo();
                    return;
                }
            }
            lastTime = v1.currentTime;
        });

        v1.addEventListener('ended', () => {
            if (cambioPrenotato) {
                avviaSecondoVideo();
            }
        });

        function avviaSecondoVideo() {
            v1.pause();
            v1.classList.add('hidden');
            
            v2.classList.remove('hidden');
            v2.play();
            
            btn.style.display = 'none';
        }
    </script>
</body>
</html>
