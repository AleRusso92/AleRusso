<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scroll Animation - Ultra Fluid & Realtime</title>
    <style>
        body {
            margin: 0;
            background-color: #000;
            font-family: sans-serif;
            /* AUMENTA O DIMINUISCI QUESTO VALORE:
               Più la pagina è alta (es. 600vh), più immagini scorrerai con un leggero movimento.
               Trova il compromesso perfetto per la fluidità del tuo set di immagini.
            */
            height: 450vh; 
        }

        .sticky-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            max-width: 100vw;
            max-height: 100vh;
            object-fit: contain;
        }

        .info {
            position: fixed;
            bottom: 20px;
            width: 100%;
            text-align: center;
            color: rgba(255,255,255,0.7);
            font-size: 0.9rem;
            text-transform: uppercase;
            pointer-events: none;
            z-index: 10;
        }
    </style>
</head>
<body>

    <div class="info">Scorri per esplorare / Resta fermo per il loop</div>

    <div class="sticky-container">
        <canvas id="animation-canvas"></canvas>
    </div>

    <script>
        const canvas = document.getElementById("animation-canvas");
        const context = canvas.getContext("2d");

        // --- 1. CONFIGURAZIONE FILE ---
        const totalCartella1 = 63; 
        const totalCartella2 = 63; 
        const loopSpeed = 80;      
        
        let targetFrame = 0;
        const formatNumber = (num) => String(num).padStart(4, '0');

        const immaginiLoop = [];
        const immaginiScroll = [];

        // Caricamento immagini
        for (let i = 1; i <= totalCartella1; i++) {
            const img = new Image();
            img.src = `1/${formatNumber(i)}.png`;
            immaginiLoop.push(img);
        }
        for (let i = 1; i <= totalCartella2; i++) {
            const img = new Image();
            img.src = `2/${formatNumber(i)}.png`;
            immaginiScroll.push(img);
        }

        immaginiLoop[0].onload = () => {
            canvas.width = immaginiLoop[0].width;
            canvas.height = immaginiLoop[0].height;
            context.drawImage(immaginiLoop[0], 0, 0);
        };

        // --- 2. LOGICA LOOP AUTOMATICO (Fermo in cima) ---
        let loopIndex = 0;
        let isScrolling = false;

        setInterval(() => {
            if (!isScrolling) {
                context.clearRect(0, 0, canvas.width, canvas.height);
                if (immaginiLoop[loopIndex]) {
                    context.drawImage(immaginiLoop[loopIndex], 0, 0);
                }
                loopIndex = (loopIndex + 1) % totalCartella1;
            }
        }, loopSpeed);

        // --- 3. AGGIORNAMENTO IN TEMPO REALE AL 100% ---
        window.addEventListener("scroll", () => {
            const scrollTop = window.scrollY;
            const maxScroll = document.documentElement.scrollHeight - window.innerHeight;
            const scrollFraction = maxScroll > 0 ? scrollTop / maxScroll : 0;

            if (scrollTop > 10) {
                isScrolling = true;
                // Calcola il frame esatto corrispondente alla posizione dello scroll
                targetFrame = Math.floor(scrollFraction * (totalCartella2 - 1));
            } else {
                isScrolling = false;
                targetFrame = 0;
            }
        }, { passive: true });


        // --- 4. MOTORE DI RENDERING (Senza ritardi indotti) ---
        let lastRenderedFrame = -1;

        function animate() {
            if (isScrolling) {
                // Disegna solo se il frame è effettivamente cambiato, per non sprecare risorse
                if (targetFrame !== lastRenderedFrame) {
                    const frameToDraw = Math.max(0, Math.min(totalCartella2 - 1, targetFrame));
                    
                    context.clearRect(0, 0, canvas.width, canvas.height);
                    if (immaginiScroll[frameToDraw]) {
                        context.drawImage(immaginiScroll[frameToDraw], 0, 0);
                    }
                    lastRenderedFrame = frameToDraw;
                }
            } else {
                lastRenderedFrame = -1; // Reset per quando si ferma in cima
            }
            
            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
