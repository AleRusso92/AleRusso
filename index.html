<!DOCTYPE html>

<html lang="it">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Scroll Inertia Animation - No Lag</title>

    <style>

        body {

            margin: 0;

            background-color: #000;

            font-family: sans-serif;

            height: 300vh; 

        }



        .sticky-container {

            position: fixed;

            top: 0;

            left: 0;

            width: 100%;

            height: 100vh;

            display: flex;

            justify-content: center;

            align-items: center;

        }



        canvas {

            max-width: 100vw;

            max-height: 100vh;

            object-fit: contain;

        }



        .info {

            position: fixed;

            bottom: 20px;

            width: 100%;

            text-align: center;

            color: rgba(255,255,255,0.7);

            font-size: 0.9rem;

            text-transform: uppercase;

            pointer-events: none;

        }

    </style>

</head>

<body>



    <div class="info">Scorri per dare velocità / Resta fermo per il loop</div>



    <div class="sticky-container">

        <canvas id="animation-canvas"></canvas>

    </div>



    <script>

        const canvas = document.getElementById("animation-canvas");

        const context = canvas.getContext("2d");



        // --- 1. CONFIGURAZIONE ---

        const totalCartella1 = 63; 

        const totalCartella2 = 63; 

        const loopSpeed = 80;      

        

        // --- FISICA DELL'INERZIA OTTIMIZZATA ---

        let currentFrame = 0;       

        let velocity = 0;           

        const friction = 0.94;        // Leggermente ridotto per rendere la frenata più decisa

        const scrollSensitivity = 0.04; 

        const minVelocityStop = 0.15; // SOGLIA ANTI-LAG: Sotto questa velocità, l'animazione si stoppa di colpo evitando lo sfarfallio finale



        const formatNumber = (num) => String(num).padStart(4, '0');



        const immaginiLoop = [];

        const immaginiScroll = [];



        // Caricamento immagini

        for (let i = 1; i <= totalCartella1; i++) {

            const img = new Image();

            img.src = `1/${formatNumber(i)}.png`;

            immaginiLoop.push(img);

        }

        for (let i = 1; i <= totalCartella2; i++) {

            const img = new Image();

            img.src = `2/${formatNumber(i)}.png`;

            immaginiScroll.push(img);

        }



        immaginiLoop[0].onload = () => {

            canvas.width = immaginiLoop[0].width;

            canvas.height = immaginiLoop[0].height;

        };



        // --- 2. LOGICA LOOP AUTOMATICO ---

        let loopIndex = 0;

        let isScrolling = false;



        setInterval(() => {

            if (!isScrolling) {

                context.clearRect(0, 0, canvas.width, canvas.height);

                context.drawImage(immaginiLoop[loopIndex], 0, 0);

                loopIndex = (loopIndex + 1) % totalCartella1;

            }

        }, loopSpeed);



        // --- 3. LOGICA DI SPINTA (SCROLL) ---

        let lastScrollTop = 0;



        window.addEventListener("scroll", () => {

            const scrollTop = window.scrollY;

            const delta = scrollTop - lastScrollTop;

            lastScrollTop = scrollTop;



            if (scrollTop > 10) {

                isScrolling = true;

                velocity += delta * scrollSensitivity;

            } else {

                isScrolling = false;

                velocity = 0;

            }

        });



        // --- 4. MOTORE FISICO CORRETTO ---

        function animate() {

            if (isScrolling) {

                // Applichiamo l'attrito

                velocity *= friction;



                // TRUCCO ANTI-LAG: Se la velocità è minima, azzerala subito. 

                // Questo evita che i frame si "trascinino" pixel dopo pixel in modo scattoso.

                if (Math.abs(velocity) < minVelocityStop) {

                    velocity = 0;

                }



                currentFrame += velocity;



                // Limiti fisici delle cartelle

                if (currentFrame < 0) {

                    currentFrame = 0;

                    velocity = 0;

                }

                if (currentFrame > totalCartella2 - 1) {

                    currentFrame = totalCartella2 - 1;

                    velocity = 0;

                }



                const frameToDraw = Math.round(currentFrame);



                context.clearRect(0, 0, canvas.width, canvas.height);

                if (immaginiScroll[frameToDraw]) {

                    context.drawImage(immaginiScroll[frameToDraw], 0, 0);

                }



                if (velocity === 0 && window.scrollY <= 10) {

                    isScrolling = false;

                }

            }

            requestAnimationFrame(animate);

        }



        animate();

    </script>

</body>

</html>
