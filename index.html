<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scroll Animation - Fixed Ticks</title>
    <style>
        body {
            margin: 0;
            background-color: #000;
            font-family: sans-serif;
            /* L'altezza ora serve solo a dare spazio per il telefono, 
               su PC controlleremo i singoli scatti della rotella direttamente */
            height: 400vh; 
        }

        .sticky-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            max-width: 100vw;
            max-height: 100vh;
            object-fit: contain;
        }

        .info {
            position: fixed;
            bottom: 20px;
            width: 100%;
            text-align: center;
            color: rgba(255,255,255,0.7);
            font-size: 0.9rem;
            text-transform: uppercase;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="info">Scorri per esplorare / Resta fermo per il loop</div>

    <div class="sticky-container">
        <canvas id="animation-canvas"></canvas>
    </div>

    <script>
        const canvas = document.getElementById("animation-canvas");
        const context = canvas.getContext("2d");

        // --- 1. CONFIGURAZIONE FILE ---
        const totalCartella1 = 63; 
        const totalCartella2 = 63; 
        const loopSpeed = 80;      
        
        // --- RILEVAMENTO DISPOSITIVO TOUCH ---
        const isTouchDevice = 'ontouchstart' in window || navigator.maxTouchPoints > 0;

        // --- FISICA INERZIALE RICALIBRATA ---
        let currentFrame = 0;       
        let targetFrame = 0;
        
        // smoothness gestisce la morbidezza del passaggio tra le foto.
        // Se lo senti gommoso, alza questo valore verso lo 0.5 o 0.8
        const smoothness = isTouchDevice ? 0.2 : 0.35; 

        // MANOPOLA PC: Quanti fotogrammi vuoi che passino al MASSIMO con un singolo tic di rotella?
        // Se metti 1, passerà una foto alla volta. Se metti 3, passerà più fluido ma veloce.
        const framesPerTick = 2; 

        const formatNumber = (num) => String(num).padStart(4, '0');

        const immaginiLoop = [];
        const immaginiScroll = [];

        // Caricamento immagini
        for (let i = 1; i <= totalCartella1; i++) {
            const img = new Image();
            img.src = `1/${formatNumber(i)}.png`;
            immaginiLoop.push(img);
        }
        for (let i = 1; i <= totalCartella2; i++) {
            const img = new Image();
            img.src = `2/${formatNumber(i)}.png`;
            immaginiScroll.push(img);
        }

        immaginiLoop[0].onload = () => {
            canvas.width = immaginiLoop[0].width;
            canvas.height = immaginiLoop[0].height;
            context.drawImage(immaginiLoop[0], 0, 0);
        };

        // --- 2. LOGICA LOOP AUTOMATICO (Fermo in cima) ---
        let loopIndex = 0;
        let isScrolling = false;

        setInterval(() => {
            if (!isScrolling) {
                context.clearRect(0, 0, canvas.width, canvas.height);
                if (immaginiLoop[loopIndex]) {
                    context.drawImage(immaginiLoop[loopIndex], 0, 0);
                }
                loopIndex = (loopIndex + 1) % totalCartella1;
            }
        }, loopSpeed);

        // --- 3. LOGICA DI CALCOLO POSIZIONE ---
        
        // Gestione per SMARTPHONE (Touch)
        window.addEventListener("scroll", () => {
            if (isTouchDevice) {
                const scrollTop = window.scrollY;
                const maxScroll = document.documentElement.scrollHeight - window.innerHeight;
                const scrollFraction = Math.max(0, Math.min(1, scrollTop / maxScroll));

                if (scrollTop > 10) {
                    isScrolling = true;
                    targetFrame = scrollFraction * (totalCartella2 - 1);
                } else {
                    isScrolling = false;
                }
            }
        });

        // Gestione per PC (Rotella bloccata a scatti fissi)
        window.addEventListener("wheel", (e) => {
            if (!isTouchDevice) {
                isScrolling = true;

                // e.deltaY ci dice solo la direzione (positivo giù, negativo su)
                if (e.deltaY > 0) {
                    // Avanza di N frame fissi
                    targetFrame += framesPerTick; 
                } else {
                    // Torna indietro di N frame fissi
                    targetFrame -= framesPerTick; 
                }

                // Limiti di sicurezza per non sforare i frame totali
                targetFrame = Math.max(0, Math.min(totalCartella2 - 1, targetFrame));

                // Se torniamo manualmente a inizio pagina, riattiva il loop
                if (window.scrollY <= 10 && targetFrame === 0) {
                    isScrolling = false;
                }
            }
        }, { passive: true });


        // --- 4. MOTORE DI RENDERING ---
        function animate() {
            if (isScrolling) {
                const diff = targetFrame - currentFrame;
                
                // Inseguiamo il target frame con la nostra morbidezza (smoothness)
                if (Math.abs(diff) < 0.05) {
                    currentFrame = targetFrame;
                } else {
                    currentFrame += diff * smoothness;
                }

                const frameToDraw = Math.round(currentFrame);

                context.clearRect(0, 0, canvas.width, canvas.height);
                if (immaginiScroll[frameToDraw]) {
                    context.drawImage(immaginiScroll[frameToDraw], 0, 0);
                }
            }
            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
