<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scroll & Loop Animation - Smooth</title>
    <style>
        body {
            margin: 0;
            background-color: #000;
            font-family: sans-serif;
            /* Puoi tenerlo basso (es 200vh o 300vh) perché ora la fluidità è gestita dal codice */
            height: 300vh; 
        }

        .sticky-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            max-width: 100vw;
            max-height: 100vh;
            object-fit: contain;
        }

        .info {
            position: fixed;
            bottom: 20px;
            width: 100%;
            text-align: center;
            color: rgba(255,255,255,0.7);
            font-size: 0.9rem;
            text-transform: uppercase;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="info">Scorri per esplorare / Resta fermo per il loop</div>

    <div class="sticky-container">
        <canvas id="animation-canvas"></canvas>
    </div>

    <script>
        const canvas = document.getElementById("animation-canvas");
        const context = canvas.getContext("2d");

        // --- 1. CONFIGURAZIONE ---
        const totalCartella1 = 63; 
        const totalCartella2 = 63; 
        const loopSpeed = 80;      
        
        // Variabili per lo scroll fluido
        let targetFrame = 0;   // Il frame dove "dovremmo" essere secondo lo scroll
        let currentFrame = 0;  // Il frame che stiamo effettivamente disegnando
        const smoothness = 0.1; // PIÙ BASSO = PIÙ FLUIDO/LENTO (es. 0.05), PIÙ ALTO = PIÙ REATTIVO (es. 0.2)

        const formatNumber = (num) => String(num).padStart(4, '0');

        const immaginiLoop = [];
        const immaginiScroll = [];

        // Caricamento immagini (Loop e Scroll)
        for (let i = 1; i <= totalCartella1; i++) {
            const img = new Image();
            img.src = `1/${formatNumber(i)}.png`;
            immaginiLoop.push(img);
        }
        for (let i = 1; i <= totalCartella2; i++) {
            const img = new Image();
            img.src = `2/${formatNumber(i)}.png`;
            immaginiScroll.push(img);
        }

        immaginiLoop[0].onload = () => {
            canvas.width = immaginiLoop[0].width;
            canvas.height = immaginiLoop[0].height;
        };

        // --- 2. LOGICA LOOP ---
        let loopIndex = 0;
        let isScrolling = false;

        setInterval(() => {
            if (!isScrolling) {
                context.clearRect(0, 0, canvas.width, canvas.height);
                context.drawImage(immaginiLoop[loopIndex], 0, 0);
                loopIndex = (loopIndex + 1) % totalCartella1;
            }
        }, loopSpeed);

        // --- 3. LOGICA SCROLL FLUIDO ---
        window.addEventListener("scroll", () => {
            const scrollTop = window.scrollY;
            const maxScroll = document.documentElement.scrollHeight - window.innerHeight;
            const scrollFraction = scrollTop / maxScroll;

            if (scrollTop > 10) {
                isScrolling = true;
                // Calcoliamo il frame di destinazione
                targetFrame = Math.min(totalCartella2 - 1, Math.floor(scrollFraction * totalCartella2));
            } else {
                isScrolling = false;
            }
        });

        // Funzione principale di animazione (gira a 60fps)
        function animate() {
            if (isScrolling) {
                // LERP: Ci avviciniamo al targetFrame un po' alla volta
                currentFrame += (targetFrame - currentFrame) * smoothness;
                
                // Arrotondiamo per disegnare un frame intero
                const frameToDraw = Math.round(currentFrame);
                
                context.clearRect(0, 0, canvas.width, canvas.height);
                if (immaginiScroll[frameToDraw]) {
                    context.drawImage(immaginiScroll[frameToDraw], 0, 0);
                }
            }
            requestAnimationFrame(animate);
        }

        animate(); // Avvia il ciclo di rendering
    </script>
</body>
</html>
