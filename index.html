<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animazione Switch on Scroll</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            margin: 0;
            padding: 0;
            background-color: #000000;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        /* Contenitore FISSO sullo schermo */
        .animation-viewport {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1;
            overflow: hidden;
        }

        /* Gestione formato 1920x1080 Full Screen */
        .img-container {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .img-container img {
            width: 100%;
            height: 100%;
            /* 'cover' riempie lo schermo (ritaglia leggermente se il monitor non è 16:9). 
               Usa 'contain' se preferisci vedere sempre il frame intero al 100% senza tagli */
            object-fit: cover; 
        }

        /* Testi in sovrimpressione */
        .ui-overlay {
            position: absolute;
            top: 40px;
            z-index: 10;
            text-align: center;
            width: 100%;
            pointer-events: none; /* Impedisce al testo di bloccare i click o lo scroll */
        }

        h1 {
            margin: 0 0 10px 0;
            font-size: 2rem;
            text-shadow: 0 4px 8px rgba(0,0,0,0.9);
            transition: color 0.3s ease;
        }

        .indicator {
            font-size: 1rem;
            opacity: 0.7;
            text-shadow: 0 2px 4px rgba(0,0,0,0.9);
        }

        /* SPAZIO DI SCROLL: Genera l'altezza necessaria per permettere l'azione di scroll */
        .scroll-space {
            height: 200vh; 
            position: relative;
            z-index: 2;
            pointer-events: none; /* Lascia passare lo scroll al body */
        }
    </style>
</head>
<body>

    <div class="animation-viewport">
        <div class="ui-overlay">
            <h1 id="status-title">Animazione 1</h1>
            <div id="status-indicator" class="indicator">Scorri verso il basso per cambiare...</div>
        </div>
        
        <div class="img-container">
            <img id="anim-target" src="1/0001.png" alt="Animazione principale">
        </div>
    </div>

    <div class="scroll-space"></div>

    <script>
        const imgTarget = document.getElementById('anim-target');
        const statusTitle = document.getElementById('status-title');
        const statusIndicator = document.getElementById('status-indicator');

        const totalFrames = 64;
        const fps = 24; // Velocità dell'animazione
        const pad = (num) => String(num).padStart(4, '0');

        let currentFrame = 1;
        let currentFolder = '1'; // Parte con la cartella 1

        // 1. PRE-CARICAMENTO (Previene i flash bianchi durante lo switch)
        for (let i = 1; i <= totalFrames; i++) {
            const img1 = new Image();
            img1.src = `1/${pad(i)}.png`;
            const img2 = new Image();
            img2.src = `2/${pad(i)}.png`;
        }

        // 2. LOOP AUTOMATICO UNICO
        // Gira continuamente, ma cambia la cartella dinamicamente in base alla variabile 'currentFolder'
        setInterval(() => {
            currentFrame = (currentFrame % totalFrames) + 1;
            imgTarget.src = `${currentFolder}/${pad(currentFrame)}.png`;
        }, 1000 / fps);

        // 3. CONTROLLO DELLO SCROLL
        // Appena rileviamo che l'utente ha sceso la pagina oltre i 100 pixel, passiamo alla cartella 2
        window.addEventListener('scroll', () => {
            const triggerPoints = 100; // Pixel di scroll necessari per attivare lo switch

            if (window.scrollY > triggerPoints) {
                if (currentFolder !== '2') {
                    currentFolder = '2';
                    statusTitle.innerText = "Animazione 2";
                    statusTitle.style.color = "#00ffcc"; // Cambia colore per feedback visivo (opzionale)
                    statusIndicator.innerText = "Torna in cima per l'Animazione 1";
                }
            } else {
                if (currentFolder !== '1') {
                    currentFolder = '1';
                    statusTitle.innerText = "Animazione 1";
                    statusTitle.style.color = "#ffffff";
                    statusIndicator.innerText = "Scorri verso il basso per cambiare...";
                }
            }
        });
    </script>

</body>
</html>
