<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Full Screen Video Switcher</title>
    <style>
        /* Reset e Schermo Intero */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Container fisso a tutto schermo */
        .video-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
        }

        video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover; /* Riempie lo schermo tagliando i bordi in eccesso se le proporzioni cambiano */
            transition: opacity 0.5s ease; /* Transizione fluida per il cambio video */
            opacity: 1;
        }

        /* Nasconde il video azzerando l'opacità */
        .hidden {
            opacity: 0;
            pointer-events: none;
        }

        /* Pulsante in sovrimpressione */
        #actionBtn {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            padding: 16px 32px;
            font-size: 18px;
            font-weight: bold;
            color: #fff;
            background-color: rgba(0, 123, 255, 0.85);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            backdrop-filter: blur(5px); /* Effetto vetro sfocato sul bottone */
            transition: all 0.3s ease;
        }

        #actionBtn:hover {
            background-color: rgba(0, 86, 179, 1);
            transform: translateX(-50%) scale(1.05);
        }

        /* Stato del pulsante in attesa che finisca il video */
        #actionBtn.waiting {
            background-color: rgba(220, 53, 69, 0.85);
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <div class="video-container">
        <video id="video1" autoplay loop muted playsinline>
            <source src="1.mkv" type="video/mp4">
        </video>

        <video id="video2" class="hidden" muted playsinline>
            <source src="2.mkv" type="video/mp4">
        </video>
    </div>

    <button id="actionBtn">Attiva Seconda Animazione</button>

    <script>
        const v1 = document.getElementById('video1');
        const v2 = document.getElementById('video2');
        const btn = document.getElementById('actionBtn');
        
        let cambioPrenotato = false;

        btn.addEventListener('click', () => {
            if (cambioPrenotato) return; // Evita che l'utente clicchi più volte inutilmente

            cambioPrenotato = true;
            
            // Feedback visivo sul pulsante per far capire che il comando è stato preso
            btn.classList.add('waiting');
            btn.innerText = "Il cambio avverrà alla fine dell'animazione attuale...";

            // Trucco: rimuoviamo l'attributo loop. 
            // In questo modo il video 1 non ricomincerà da capo, ma attiverà l'evento 'ended'
            v1.removeAttribute('loop');
        });

        // Quando il video 1 finisce NATURALMENTE il suo giro corrente
        v1.addEventListener('ended', () => {
            if (cambioPrenotato) {
                // 1. Nasconde il video 1
                v1.classList.add('hidden');
                
                // 2. Mostra e fa partire il video 2
                v2.classList.remove('hidden');
                v2.play();
                
                // 3. Rimuove il pulsante visto che la transizione è completata
                btn.style.display = 'none';
            }
        });
    </script>
</body>
</html>
