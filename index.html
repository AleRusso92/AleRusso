<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fluid Scroll Animation</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            /* L'altezza del body definisce la durata dello scroll. 
               Più è alto, più lo scorrimento è lento e fluido. */
            height: 500vh; 
            overflow-x: hidden;
        }

        .canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1;
        }

        canvas {
            display: block;
            max-width: 100vw;
            max-height: 100vh;
            object-fit: contain;
        }

        .loader-info {
            position: fixed;
            bottom: 20px;
            width: 100%;
            text-align: center;
            color: white;
            font-family: sans-serif;
            letter-spacing: 2px;
            font-size: 10px;
            text-transform: uppercase;
            opacity: 0.5;
            z-index: 10;
        }
    </style>
</head>
<body>

    <div class="loader-info">Scorri per muovere l'animazione</div>

    <div class="canvas-container">
        <canvas id="scroll-canvas"></canvas>
    </div>

    <script>
        const canvas = document.getElementById("scroll-canvas");
        const ctx = canvas.getContext("2d");

        // --- CONFIGURAZIONE ---
        const totalFrames = 63;
        const frames = [];
        const animationState = {
            current: 0, // Frame attualmente disegnato
            target: 0   // Frame dove dovremmo essere secondo lo scroll
        };

        // --- FLUIDITÀ (LERP) ---
        // Più basso è il numero (es. 0.05), più l'animazione è "burrosa" e morbida.
        // Più alto è (es. 0.2), più è reattiva e veloce.
        const smoothness = 0.1;

        // --- PRE-CARICAMENTO IMMAGINI ---
        const preloadImages = () => {
            for (let i = 1; i <= totalFrames; i++) {
                const img = new Image();
                // Assicurati che il percorso sia corretto (es: folder 2/)
                img.src = `2/${i.toString().padStart(4, '0')}.png`;
                frames.push(img);
            }
        };

        // Imposta dimensioni canvas appena carica la prima immagine
        frames[0] = new Image();
        frames[0].src = `2/0001.png`;
        frames[0].onload = () => {
            canvas.width = frames[0].width;
            canvas.height = frames[0].height;
            render(); // Avvia il primo render
        };

        preloadImages();

        // --- GESTIONE SCROLL ---
