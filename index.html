<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animazione Frame by Frame</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            margin: 0;
            padding: 0;
            background-color: #000000;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        /* Contenitore standard per le immagini */
        .img-container {
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .img-container img {
            width: 100%;
            height: auto;
            object-fit: contain;
            display: block;
        }

        /* --- SEZIONE 1: LOOP AUTOMATICO --- */
        .section-loop {
            padding: 60px 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        /* --- SEZIONE 2: ANIMAZIONE AL SCROLL --- */
        /* Questa sezione è molto alta per permettere lo scrolling dell'animazione */
        .section-scroll {
            height: 400vh; /* Più è alta, più lo scroll sarà lento e fluido */
            position: relative;
        }

        /* Il contenitore rimane fisso sullo schermo mentre si scrolla */
        .sticky-container {
            position: sticky;
            top: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow: hidden;
        }
    </style>
</head>
<body>

    <div class="section-loop">
        <h2>Animazione Automatico (Cartella 1)</h2>
        <div class="img-container">
            <img id="loop-img" src="1/0001.png" alt="Animazione in loop">
        </div>
    </div>

    <div class="section-scroll" id="scroll-trigger">
        <div class="sticky-container">
            <h2>Scorri con il mouse per animare (Cartella 2)</h2>
            <div class="img-container">
                <img id="scroll-img" src="2/0001.png" alt="Animazione a scorrimento">
            </div>
        </div>
    </div>

    <script>
        // Funzione di utilità per trasformare i numeri in formato 4 cifre (es. 5 -> 0005)
        const pad = (num) => String(num).padStart(4, '0');

        // Configurazione comune
        const totalFrames = 64;

        // -----------------------------------------------------------------
        // 1. GESTIONE LOOP AUTOMATICO (Cartella 1)
        // -----------------------------------------------------------------
        const loopImg = document.getElementById('loop-img');
        let currentLoopFrame = 1;
        const fps = 24; // Velocità dell'animazione (fotogrammi al secondo)

        setInterval(() => {
            currentLoopFrame = (currentLoopFrame % totalFrames) + 1;
            loopImg.src = `1/${pad(currentLoopFrame)}.png`;
        }, 1000 / fps);


        // -----------------------------------------------------------------
        // 2. GESTIONE SCROLL (Cartella 2)
        // -----------------------------------------------------------------
        const scrollImg = document.getElementById('scroll-img');
        const scrollTrigger = document.getElementById('scroll-trigger');

        // Pre-caricamento opzionale in memoria per evitare sfarfallii (consigliato per lo scroll)
        for (let i = 1; i <= totalFrames; i++) {
            const img = new Image();
            img.src = `2/${pad(i)}.png`;
        }

        window.addEventListener('scroll', () => {
            // Calcola la posizione dello scroll rispetto alla sezione dedicata
            const rect = scrollTrigger.getBoundingClientRect();
            const sectionHeight = rect.height - window.innerHeight;
            const scrolledAmount = -rect.top;

            // Calcola la percentuale di avanzamento dello scroll (da 0 a 1)
            let percentage = scrolledAmount / sectionHeight;
            
            // Mantiene la percentuale nei limiti del range 0-1
            if (percentage < 0) percentage = 0;
            if (percentage > 1) percentage = 1;

            // Converte la percentuale nel rispettivo fotogramma (da 1 a 64)
            let currentScrollFrame = Math.floor(percentage * (totalFrames - 1)) + 1;
            
            // Aggiorna l'immagine della cartella 2
            scrollImg.src = `2/${pad(currentScrollFrame)}.png`;
        });
    </script>

</body>
</html>
