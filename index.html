<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scroll Animation - Legato alla Pagina</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            /* L'altezza totale della pagina. Più è alta, più devi scorrere per finire l'animazione */
            height: 400vh; 
        }

        .sticky-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            max-width: 100vw;
            max-height: 100vh;
            object-fit: contain;
        }

        .info {
            position: fixed;
            bottom: 20px;
            width: 100%;
            text-align: center;
            color: rgba(255,255,255,0.7);
            font-size: 0.9rem;
            text-transform: uppercase;
            pointer-events: none;
            z-index: 10;
        }
    </style>
</head>
<body>

    <div class="info">Scorri la pagina verso il basso</div>

    <div class="sticky-container">
        <canvas id="animation-canvas"></canvas>
    </div>

    <script>
        const canvas = document.getElementById("animation-canvas");
        const context = canvas.getContext("2d");

        // --- CONFIGURAZIONE ---
        const totalCartella1 = 63; // Immagini Loop (Fermo in cima)
        const totalCartella2 = 63; // Immagini Scroll
        const loopSpeed = 80;      // Velocità in millisecondi del loop in cima

        const formatNumber = (num) => String(num).padStart(4, '0');

        const immaginiLoop = [];
        const immaginiScroll = [];

        // Precaricamento Immagini
        for (let i = 1; i <= totalCartella1; i++) {
            const img = new Image();
            img.src = `1/${formatNumber(i)}.png`;
            immaginiLoop.push(img);
        }
        for (let i = 1; i <= totalCartella2; i++) {
            const img = new Image();
            img.src = `2/${formatNumber(i)}.png`;
            immaginiScroll.push(img);
        }

        // Primo rendering
        immaginiLoop[0].onload = () => {
            canvas.width = immaginiLoop[0].width;
            canvas.height = immaginiLoop[0].height;
            context.drawImage(immaginiLoop[0], 0, 0);
        };

        // --- GESTIONE STATO ---
        let isAtTop = true;
        let loopIndex = 0;

        // --- LOOP AUTOMATICO (quando la pagina è in cima) ---
        setInterval(() => {
            if (isAtTop && immaginiLoop.length > 0) {
                context.clearRect(0, 0, canvas.width, canvas.height);
                if (immaginiLoop[loopIndex]) {
                    context.drawImage(immaginiLoop[loopIndex], 0, 0);
                }
                loopIndex = (loopIndex + 1) % totalCartella1;
            }
        }, loopSpeed);

        // --- COLLEGAMENTO 1:1 ALLO SCROLL DELLA PAGINA ---
        window.addEventListener("scroll", () => {
            const scrollTop = window.scrollY; // Quanti pixel hai scorso dall'alto
            
            // Se siamo nei primi 10 pixel, riattiva il loop della cartella 1
            if (scrollTop <= 10) {
                isAtTop = true;
                return;
            }

            // Altrimenti, disattiva il loop e calcola il frame della cartella 2
            isAtTop = false;

            // Calcoliamo lo spazio effettivamente "scorribile"
            const maxScroll = document.documentElement.scrollHeight - window.innerHeight;
            
            // Percentuale di scroll della pagina (da 0.0 a 1.0)
            const scrollFraction = Math.max(0, Math.min(1, scrollTop / maxScroll));

            // Troviamo il fotogramma esatto in base alla percentuale
            const frameIndex = Math.floor(scrollFraction * (totalCartella2 - 1));

            // Disegniamo immediatamente quel fotogramma
            requestAnimationFrame(() => {
                context.clearRect(0, 0, canvas.width, canvas.height);
                if (immaginiScroll[frameIndex]) {
                    context.drawImage(immaginiScroll[frameIndex], 0, 0);
                }
            });
        }, { passive: true }); // passive: true migliora le performance dello scroll

    </script>
</body>
</html>
