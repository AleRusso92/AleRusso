<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scroll Animation - Smooth & Fluid</title>
    <style>
        body {
            margin: 0;
            background-color: #000;
            font-family: sans-serif;
            /* Altezza della pagina: più è alta, più lo scroll sarà lento e fluido */
            height: 500vh; 
        }

        .sticky-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            max-width: 100vw;
            max-height: 100vh;
            object-fit: contain;
        }

        .info {
            position: fixed;
            bottom: 20px;
            width: 100%;
            text-align: center;
            color: rgba(255,255,255,0.7);
            font-size: 0.9rem;
            text-transform: uppercase;
            pointer-events: none;
            z-index: 10;
        }
    </style>
</head>
<body>

    <div class="info">Scorri per esplorare / Resta fermo per il loop</div>

    <div class="sticky-container">
        <canvas id="animation-canvas"></canvas>
    </div>

    <script>
        const canvas = document.getElementById("animation-canvas");
        const context = canvas.getContext("2d");

        // --- 1. CONFIGURAZIONE FILE ---
        const totalCartella1 = 63; 
        const totalCartella2 = 63; 
        const loopSpeed = 80;      
        
        // --- FISICA INERZIALE UNIFICATA ---
        let currentFrame = 0;       
        let targetFrame = 0;
        
        // smoothness gestisce l'effetto "calamita/morbidezza" dell'animazione.
        // Più è basso (es. 0.05), più l'animazione sarà lenta e burrosa a inseguire lo scroll.
        // Più è alto (es. 0.2), più sarà reattiva e incollata al dito/rotella.
        const smoothness = 0.1; 

        const formatNumber = (num) => String(num).padStart(4, '0');

        const immaginiLoop = [];
        const immaginiScroll = [];

        // Caricamento immagini
        for (let i = 1; i <= totalCartella1; i++) {
            const img = new Image();
            img.src = `1/${formatNumber(i)}.png`;
            immaginiLoop.push(img);
        }
        for (let i = 1; i <= totalCartella2; i++) {
            const img = new Image();
            img.src = `2/${formatNumber(i)}.png`;
            immaginiScroll.push(img);
        }

        immaginiLoop[0].onload = () => {
            canvas.width = immaginiLoop[0].width;
            canvas.height = immaginiLoop[0].height;
            context.drawImage(immaginiLoop[0], 0, 0);
        };

        // --- 2. LOGICA LOOP AUTOMATICO (Fermo in cima) ---
        let loopIndex = 0;
        let isScrolling = false;

        setInterval(() => {
            if (!isScrolling) {
                context.clearRect(0, 0, canvas.width, canvas.height);
                if (immaginiLoop[loopIndex]) {
                    context.drawImage(immaginiLoop[loopIndex], 0, 0);
                }
                loopIndex = (loopIndex + 1) % totalCartella1;
            }
        }, loopSpeed);

        // --- 3. LOGICA DI CALCOLO POSIZIONE (Unificata PC e Touch) ---
        window.addEventListener("scroll", () => {
            const scrollTop = window.scrollY;
            const maxScroll = document.documentElement.scrollHeight - window.innerHeight;
            
            // Evita divisioni per zero se la pagina non è abbastanza alta
            const scrollFraction = maxScroll > 0 ? scrollTop / maxScroll : 0;

            // Se l'utente ha scollato più di 10px, passiamo ai frame di scroll
            if (scrollTop > 10) {
                isScrolling = true;
                targetFrame = scrollFraction * (totalCartella2 - 1);
            } else {
                // Se torna esattamente in cima, resetta e fa ripartire il loop
                isScrolling = false;
                targetFrame = 0;
            }
        }, { passive: true });


        // --- 4. MOTORE DI RENDERING ---
        function animate() {
            if (isScrolling) {
                const diff = targetFrame - currentFrame;
                
                // Inseguiamo il target frame con l'effetto volano (smoothness)
                if (Math.abs(diff) < 0.01) {
                    currentFrame = targetFrame;
                } else {
                    currentFrame += diff * smoothness;
                }

                // Arrotondiamo per prendere il fotogramma intero più vicino
                const frameToDraw = Math.max(0, Math.min(totalCartella2 - 1, Math.round(currentFrame)));

                context.clearRect(0, 0, canvas.width, canvas.height);
                if (immaginiScroll[frameToDraw]) {
                    context.drawImage(immaginiScroll[frameToDraw], 0, 0);
                }
            } else {
                // Se non stiamo scrollando, facciamo scivolare dolcemente currentFrame a 0
                if (currentFrame > 0.1) {
                    currentFrame += (0 - currentFrame) * smoothness;
                } else {
                    currentFrame = 0;
                }
            }
            
            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
