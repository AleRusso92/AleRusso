<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scroll & Loop Video Animation</title>
    <style>
        body {
            margin: 0;
            background-color: #000;
            font-family: sans-serif;
            /* Più è alto questo valore, più lo scroll sarà lungo e lento */
            height: 500vh; 
        }

        .sticky-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        video {
            max-width: 100vw;
            max-height: 100vh;
            object-fit: contain;
            display: none; /* Nascondiamo i video di base */
        }

        /* Mostra il video attivo */
        video.active {
            display: block;
        }

        .info {
            position: fixed;
            bottom: 20px;
            width: 100%;
            text-align: center;
            color: rgba(255,255,255,0.6);
            font-size: 0.9rem;
            text-transform: uppercase;
            pointer-events: none;
            z-index: 10;
        }
    </style>
</head>
<body>

    <div class="info">Scorri per esplorare / Resta fermo per il loop</div>

    <div class="sticky-container">
        <video id="video-loop" src="loop.mp4" autoplay loop muted playsinline class="active"></video>
        
        <video id="video-scroll" src="scroll.mp4" muted playsinline preload="auto"></video>
    </div>

    <script>
        const videoLoop = document.getElementById("video-loop");
        const videoScroll = document.getElementById("video-scroll");

        window.addEventListener("scroll", () => {
            const scrollTop = window.scrollY;
            const maxScroll = document.documentElement.scrollHeight - window.innerHeight;
            const scrollFraction = scrollTop / maxScroll;

            // Se siamo all'inizio della pagina (Utente fermo in cima)
            if (scrollTop <= 10) {
                videoScroll.classList.remove("active");
                videoLoop.classList.add("active");
                videoLoop.play();
            } else {
                // Se l'utente sta scrollando
                videoLoop.pause();
                videoLoop.classList.remove("active");
                videoScroll.classList.add("active");

                // Mappa lo scroll sulla durata del secondo video
                if (videoScroll.duration) {
                    // Calcola il secondo esatto del video in base allo scroll
                    videoScroll.currentTime = videoScroll.duration * scrollFraction;
                }
            }
        });
    </script>
</body>
</html>
