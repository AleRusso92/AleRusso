<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animazione Trigger su Click</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            margin: 0;
            padding: 0;
            background-color: #000000;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden; /* Blocca lo scroll della pagina */
        }

        /* Contenitore principale a tutto schermo */
        .animation-viewport {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Gestione formato 1920x1080 Full Screen */
        .img-container {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .img-container img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Cambia in 'contain' se non vuoi tagliare i bordi su schermi non 16:9 */
        }

        /* Interfaccia utente sovrapposta */
        .ui-overlay {
            position: absolute;
            bottom: 50px; /* Posizionato in basso */
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            text-align: center;
        }

        /* Stile del pulsante (Modificabile a piacimento) */
        .trigger-btn {
            background-color: #ffffff;
            color: #000000;
            border: none;
            padding: 15px 30px;
            font-size: 1rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 255, 255, 0.3);
            transition: all 0.2s ease;
        }

        .trigger-btn:hover {
            background-color: #00ffcc;
            transform: scale(1.05);
            box-shadow: 0 4px 20px rgba(0, 255, 204, 0.5);
        }

        /* Stato disattivato quando l'animazione 2 è finita */
        .trigger-btn:disabled {
            background-color: #333333;
            color: #666666;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
    </style>
</head>
<body>

    <div class="animation-viewport">
        <div class="ui-overlay">
            <button id="start-anim-2" class="trigger-btn">Avvia Animazione 2</button>
        </div>
        
        <div class="img-container">
            <img id="anim-target" src="1/0001.png" alt="Animazione">
        </div>
    </div>

    <script>
        const imgTarget = document.getElementById('anim-target');
        const btnTrigger = document.getElementById('start-anim-2');

        const totalFrames = 64;
        const fps = 24; // Velocità fotogrammi
        const pad = (num) => String(num).padStart(4, '0');

        let currentFrame = 1;
        let currentFolder = '1'; // Parte con la cartella 1

        // 1. PRE-CARICAMENTO
        for (let i = 1; i <= totalFrames; i++) {
            const img1 = new Image(); img1.src = `1/${pad(i)}.png`;
            const img2 = new Image(); img2.src = `2/${pad(i)}.png`;
        }

        // 2. TIMING DELL'ANIMAZIONE
        const loopTimer = setInterval(() => {
            if (currentFolder === '1') {
                // Loop continuo per la cartella 1
                currentFrame = (currentFrame % totalFrames) + 1;
                imgTarget.src = `1/${pad(currentFrame)}.png`;
            } else if (currentFolder === '2') {
                // Riproduzione singola per la cartella 2
                if (currentFrame < totalFrames) {
                    currentFrame++;
                    imgTarget.src = `2/${pad(currentFrame)}.png`;
                } else {
                    // Arrivato al frame 64, ferma il timer per sempre
                    clearInterval(loopTimer);
                    btnTrigger.innerText = "Animazione Conclusa";
                    btnTrigger.disabled = true;
                }
            }
        }, 1000 / fps);

        // 3. EVENTO CLICK SUL PULSANTE
        btnTrigger.addEventListener('click', () => {
            if (currentFolder === '1') {
                currentFolder = '2';
                currentFrame = 1; // Resetta il conteggio per partire dal primo frame di "2"
                imgTarget.src = `2/${pad(currentFrame)}.png`; // Cambia subito il primo frame
                
                // Modifiche estetiche temporanee al pulsante durante la riproduzione
                btnTrigger.innerText = "Riproduzione...";
                btnTrigger.style.pointerEvents = "none"; // Impedisce click multipli
            }
        });
    </script>

</body>
</html>
