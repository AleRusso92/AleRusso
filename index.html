<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Ale - Video Switcher</title>
    <style>
        /* Reset totale per eliminare qualsiasi bordo o barra di scorrimento */
        * {
            box-sizing: border-box;
        }
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: sans-serif;
        }

        /* CSS per il full screen totale */
        video {
            position: fixed;
            top: 50%;
            left: 50%;
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            z-index: 1;
            transform: translate(-50%, -50%);
            object-fit: cover;
            transition: opacity 0.3s ease;
            opacity: 1;
        }

        .hidden {
            opacity: 0;
            pointer-events: none;
        }

        /* Bottone in primo piano */
        #actionBtn {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            padding: 16px 32px;
            font-size: 18px;
            font-weight: bold;
            color: #fff;
            background-color: #007bff;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            transition: all 0.2s ease;
        }

        #actionBtn:hover {
            background-color: #0056b3;
            transform: translateX(-50%) scale(1.05);
        }

        #actionBtn.waiting {
            background-color: #6c757d;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <video id="video1" autoplay muted playsinline>
        <source src="1.mp4" type="video/mp4">
    </video>

    <video id="video2" class="hidden" muted playsinline>
        <source src="2.mp4" type="video/mp4">
    </video>

    <video id="video3" class="hidden" muted playsinline>
        <source src="3.mp4" type="video/mp4">
    </video>

    <button id="actionBtn">Entra in Schermo Intero e Prenota Cambio</button>

<script>
const v1 = document.getElementById('video1');
const v2 = document.getElementById('video2');
const v3 = document.getElementById('video3');
const btn = document.getElementById('actionBtn');

let cambioPrenotato = false;
let loopCounter = 0;
const targetLoop = 3; // Fisso a 3 loop del video 1 prima di passare al video 3

// Margine di anticipo: 1 frame a 25 fps equivale a 0.04 secondi
const anticipoFrame = 0.04; 

btn.addEventListener('click', () => {
    if (cambioPrenotato) return;
    cambioPrenotato = true;
    btn.classList.add('waiting');
    btn.innerText = "Cambio al termine dell'animazione...";
});

// Controllo del tempo per applicare l'anticipo del frame
v1.addEventListener('timeupdate', () => {
    if (!v1.duration) return;

    // Se mancano 0.04 secondi o meno alla fine del video
    if (v1.currentTime >= v1.duration - anticipoFrame) {
        
        if (cambioPrenotato) {
            // Se l'utente ha cliccato il pulsante, diamo la priorità al video 2
            avviaSecondoVideo();
        } else {
            // Gestione dei loop regolari del video 1
            loopCounter++;
            console.log(`Loop completato. Conteggio: ${loopCounter}/${targetLoop}`);

            if (loopCounter >= targetLoop) {
                avviaTerzoVideo();
            } else {
                // Forza il riavvio del video 1 un frame in anticipo
                v1.currentTime = 0;
                v1.play().catch(e => console.log(e));
            }
        }
    }
});

// Ruota di scorta nel caso in cui l'evento 'timeupdate' non intercetti il millisecondo esatto
v1.addEventListener('ended', () => {
    if (cambioPrenotato) {
        avviaSecondoVideo();
    } else {
        loopCounter++;
        if (loopCounter >= targetLoop) {
            avviaTerzoVideo();
        } else {
            v1.currentTime = 0;
            v1.play().catch(e => console.log(e));
        }
    }
});

// Quando il video 3 finisce, ritorna al ciclo principale di video 1
v3.addEventListener('ended', () => {
    tornaAlVideoUno();
});

function avviaSecondoVideo() {
    v1.pause();
    v3.pause();
    v1.classList.add('hidden');
    v3.classList.add('hidden');

    v2.classList.remove('hidden');
    v2.play().catch(error => console.log("Errore riproduzione video 2:", error));

    btn.style.display = 'none'; // Nasconde il pulsante
}

function avviaTerzoVideo() {
    v1.pause();
    v1.classList.add('hidden');
    
    v3.classList.remove('hidden');
    v3.currentTime = 0;
    v3.play().catch(error => console.log("Errore riproduzione video 3:", error));
}

function tornaAlVideoUno() {
    v3.pause();
    v3.classList.add('hidden');
    
    // Resetta il contatore per contare altri 3 loop di v1
    loopCounter = 0;

    v1.classList.remove('hidden');
    v1.currentTime = 0;
    v1.play().catch(error => console.log("Errore ritorno a video 1:", error));
}
</script>
</body>
</html>
